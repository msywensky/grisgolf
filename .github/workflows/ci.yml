name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm run build

  backend-build:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      # Import the app to catch syntax/import errors. Dummy Supabase config
      # is enough since this doesn't make any network calls.
      - name: Import check
        env:
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-key
        run: python -c "from app.main import app"

      # Build the actual Cloud Run image to catch Dockerfile/dependency drift.
      - name: Docker build
        run: docker build -t hmb-api-ci .
