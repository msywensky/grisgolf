name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm run build

  backend-build:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      # Import the app to catch syntax/import errors. Dummy Supabase config
      # is enough since this doesn't make any network calls.
      - name: Import check
        env:
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-key
        run: python -c "from app.main import app"

      # Build the actual Cloud Run image to catch Dockerfile/dependency drift.
      - name: Docker build
        run: docker build -t hmb-api-ci .

  deploy:
    name: Deploy to Cloud Run
    needs: [frontend-build, backend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: scramble-hmbgolf
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Env vars and secrets already live on the Cloud Run service from the
      # initial manual deploy (see README) — this only ships the new image.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy hmb-scramble-api \
            --source backend \
            --region us-central1 \
            --quiet
